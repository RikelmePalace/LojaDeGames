<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost of Tsushima | FrameStore</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="navbar">
        <div class="logo-container">
            <div class="dashboard-menu" onclick="toggleMenu()">
                <span></span><span></span><span></span>
            </div>
            <img src="img/Logotipo Unico.png" alt="Logo" class="logo-unico">
            <img src="img/Logotipo  Nome.png" alt="Logo" class="logo-nome">
        </div>
        <div class="search-bar">
            <input type="text" placeholder="Procurar jogos...">
            <button>🔍</button>
        </div>
        <button class="btn-entrar">Entrar</button>
    </header>

    <aside class="sidebar-menu" id="sidebar">
        <div class="sidebar-header">
            <div class="dashboard-menu" onclick="toggleMenu()">
                <span></span><span></span><span></span>
            </div>
        </div>
        <ul>
            <li><a href="index.html"><i class="fas fa-home"></i> Início</a></li>
            <li><a href="#"><i class="fas fa-tag"></i> Ofertas</a></li>
            <li><a href="#"><i class="fas fa-gift"></i> Gift Cards</a></li>
            <li><a href="#"><i class="fas fa-desktop"></i> PC</a></li>
            <li><a href="#"><i class="fab fa-playstation"></i> Playstation</a></li>
            <li><a href="#"><i class="fab fa-xbox"></i> Xbox</a></li>
        </ul>
    </aside>
    <div id="overlay" class="overlay" onclick="toggleMenu()"></div>

    <main class="product-page">
        <h1 class="game-title">Ghost of Tsushima Director's Cut</h1>

        <div class="game-details-container">
            
            <div class="game-gallery">
                <div class="main-view">
                    <button class="nav-arrow prev-img" onclick="moveGallery(-1)">❮</button>
                    <img src="image/Ghost of tsushima tumble.png" id="current-img" alt="Jogo">
                    <button class="nav-arrow next-img" onclick="moveGallery(1)">❯</button>
                </div>
                <div class="thumb-list">
                    </div>
            </div>

            <aside class="purchase-card">
                <div class="price-section">
                    <span class="currency"></span>
                    <span class="value">249,90</span>
                </div>
                
                <div class="platform-info-card">
                    <i class="fab fa-steam"></i>
                    <div class="info-text">
                        <strong>Steam</strong>
                        <br>
                        <span>Windows</span>
                    </div>
                </div>

                <p class="activation-msg">Ativado através de Chave de ativação</p>

                <div class="buy-wishlist-buttons">
                    <button class="btn-purchase-green">
                        <i class="fas fa-shopping-cart"></i> Comprar
                    </button>
                    <button class="btn-wishlist-grey">
                        <i class="fas fa-heart"></i> Desejo
                    </button>
                </div>
            </aside>

        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
